services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: career_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/career_radar
    depends_on: [db]
    ports: ["8000:8000"]
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    depends_on: [backend]
    ports: ["3000:3000"]
volumes:
  pgdata:
